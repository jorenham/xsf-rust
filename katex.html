  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/katex@0.16.43/dist/katex.min.css"
  integrity="sha384-GN/+TZ6J/TdzuQrKFjIgwzaM0nkbGRiCBnJ9i+CmaynUcJDRE3u6Frp/8oj/lBze"
  crossorigin="anonymous"
>
<script
  src="https://cdn.jsdelivr.net/npm/katex@0.16.43/dist/katex.min.js"
  integrity="sha384-I/76u4uGYb2jZizpHGbumq1RzC/CknJIAamvKNrTumsehWnS4xX0FFQvlX0I2s/n"
  crossorigin="anonymous"
>
</script>
<script
  src="https://cdn.jsdelivr.net/npm/katex@0.16.43/dist/contrib/auto-render.min.js"
  integrity="sha384-bjyGPfbij8/NDKJhSGZNP/khQVgtHUE5exjm4Ydllo42FwIgYsdLO2lXGmRBf5Mz"
  crossorigin="anonymous"
>
</script>
<script
  src="https://cdn.jsdelivr.net/npm/katex@0.16.43/dist/contrib/copy-tex.min.js"
  integrity="sha384-Pe2JWbaShhSRT0SESJ9XLPeAsi4yrNi7r/CiH0Coq7giBjK5a6Ae7XcybE8rNlQP"
  crossorigin="anonymous"
>
</script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  renderMathInElement(document.body, {
    strict: "error",
    throwOnError: false,
    delimiters: [{left: "$$", right: "$$", display: true}, {left: "$", right: "$", display: false}],
    macros: {
      // absolute value
      "\\abs": String.raw`\left| #1 \right|`,

      // Beta functions
      "\\B": String.raw`\operatorname{\Beta}`,
      "\\I": String.raw`\operatorname{I}`,

      // error function
      "\\erf": String.raw`\operatorname{\mathrm{erf}}`,
      "\\erfc": String.raw`\operatorname{\mathrm{erfc}}`,
      "\\erfi": String.raw`\operatorname{\mathrm{erfi}}`,

      // sign function
      "\\sgn": "\\operatorname{\\mathrm{sgn}}",

      // kelvin functions
      "\\ber": String.raw`\operatorname{\mathrm{ber}}`,
      "\\bei": String.raw`\operatorname{\mathrm{bei}}`,
      "\\ker": String.raw`\operatorname{\mathrm{ker}}`,
      "\\kei": String.raw`\operatorname{\mathrm{kei}}`,

      // sine and cosine integrals
      "\\Si": String.raw`\operatorname{\mathrm{Si}}`,
      "\\Ci": String.raw`\operatorname{\mathrm{Ci}}`,
      "\\Shi": String.raw`\operatorname{\mathrm{Shi}}`,
      "\\Chi": String.raw`\operatorname{\mathrm{Chi}}`,

      // falling and rising factorials
      "\\fpow": String.raw`\left(#1\right)^{\smash{-}}_{#2}`,
      "\\rpow": String.raw`\left(#1\right)^{\smash{+}}_{#2}`,

      // hypergeometric functions
      "\\hyp": String.raw`{}_#1F_#2\left[{#3 \atop #4} \middle| \, {#5} \right]`,

      // some missing "physics" tex package commands
      "\\dd": String.raw`\,\mathrm{d}`,
    },
  })
})
</script>

<style>
.docblock > p { overflow-y: hidden }
</style>
